[env:matrixportal_s3]
platform = espressif32@6.12.0
board = adafruit_matrixportal_esp32s3
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
board_upload.use_1200bps_touch = no
board_upload.wait_for_upload_port = no
upload_speed = 460800
lib_deps =
	ProtoTracer
	SPI
	Wire
	mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display
	adafruit/Adafruit BusIO@^1.11.3
	adafruit/Adafruit Unified Sensor@^1.1.4
	adafruit/Adafruit APDS9960 Library@^1.2.2
	adafruit/Adafruit SSD1306@^2.5.7
	adafruit/Adafruit GFX Library
build_flags =
	-D PROJECT_PROTOGEN_MATRIXPORTAL_S3
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
	+<*>
	-<.git/>

[platformio]
description = This project is a 3D ray-tracing and animation engine for pixel matrices, designed to be used for drawing live animations on Protogen style characters from 3D object files (.OBJ).
default_envs = matrixportal_s3
test_dir = test
